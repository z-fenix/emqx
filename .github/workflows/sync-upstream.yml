name: Sync Fork

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

# 关键：添加 workflows 写入权限
permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync branches
        run: |
          git remote add upstream https://github.com/emqx/emqx.git
          git fetch upstream
          
          # Sync master
          git checkout master
          git merge upstream/master --no-edit
          git push origin master
          
          # Sync release-61
          git checkout release-61 2>/dev/null || git checkout -b release-61 origin/release-61
          git merge upstream/release-61 --no-edit
          git push origin release-61
